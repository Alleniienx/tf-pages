<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>重置密码 - AX采集</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      min-height: 100vh;
      background:
        radial-gradient(circle at top right, rgba(238, 77, 45, 0.08), transparent 30%),
        linear-gradient(180deg, #fffaf8 0%, #ffffff 24%);
      font-family: "Microsoft YaHei", "PingFang SC", "Hiragino Sans GB", "Segoe UI", Arial, sans-serif;
      color: #333;
      padding: 24px 14px;
    }
    .shell {
      width: 100%;
      max-width: 380px;
      margin: 0 auto;
    }
    .card {
      background: linear-gradient(180deg, #fffaf8 0%, #ffffff 100%);
      border: 1px solid #f4ddd5;
      border-radius: 14px;
      padding: 18px 16px;
      box-shadow: 0 10px 24px rgba(237, 92, 53, 0.08);
    }
    .title {
      font-size: 20px;
      font-weight: 800;
      margin-bottom: 6px;
    }
    .desc {
      font-size: 13px;
      line-height: 1.6;
      color: #666;
      margin-bottom: 14px;
    }
    .status,
    .error-msg,
    .success-msg {
      display: none;
      margin-bottom: 12px;
      padding: 10px 12px;
      border-radius: 10px;
      font-size: 13px;
      line-height: 1.5;
    }
    .status.show,
    .error-msg.show,
    .success-msg.show {
      display: block;
    }
    .status {
      background: #fff7e6;
      border: 1px solid #ffd591;
      color: #ad6800;
    }
    .error-msg {
      background: #fff2f0;
      border: 1px solid #ffccc7;
      color: #ff4d4f;
    }
    .success-msg {
      background: #f6ffed;
      border: 1px solid #b7eb8f;
      color: #389e0d;
    }
    .form-group {
      margin-bottom: 12px;
    }
    .form-group label {
      display: block;
      margin-bottom: 5px;
      font-size: 12px;
      font-weight: 700;
      color: #555;
    }
    .password-wrap {
      position: relative;
    }
    .form-group input {
      width: 100%;
      padding: 10px 40px 10px 12px;
      border: 1px solid #e0e0e0;
      border-radius: 10px;
      font-size: 14px;
      outline: none;
      background: #fafafa;
      transition: border-color 0.2s, box-shadow 0.2s, background 0.2s;
    }
    .form-group input:focus {
      border-color: #ee4d2d;
      box-shadow: 0 0 0 2px rgba(238, 77, 45, 0.1);
      background: #fff;
    }
    .toggle-pw {
      position: absolute;
      right: 10px;
      top: 50%;
      transform: translateY(-50%);
      width: 24px;
      height: 24px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      color: #999;
      cursor: pointer;
      user-select: none;
      border-radius: 999px;
      transition: color 0.2s, background 0.2s;
      background: transparent;
      border: none;
      padding: 0;
    }
    .toggle-pw:hover {
      color: #888;
      background: rgba(0, 0, 0, 0.04);
    }
    .toggle-pw svg {
      width: 15px;
      height: 15px;
    }
    .btn {
      width: 100%;
      padding: 11px 12px;
      border: none;
      border-radius: 10px;
      font-size: 14px;
      font-weight: 700;
      cursor: pointer;
      transition: all 0.2s;
    }
    .btn-primary {
      background: #ee4d2d;
      color: #fff;
    }
    .btn-primary:hover {
      background: #d9421e;
    }
    .btn-primary:disabled {
      background: #f5a48a;
      cursor: not-allowed;
    }
    .tips {
      margin-top: 14px;
      font-size: 12px;
      line-height: 1.6;
      color: #777;
    }
    .hidden {
      display: none;
    }
  </style>
</head>
<body>
  <div class="shell">
    <div class="card">
      <div class="title">重置密码</div>
      <div class="desc">请设置新的登录密码。修改成功后，回到插件里使用新密码重新登录即可。</div>

      <div id="status" class="status show">正在校验重置链接...</div>
      <div id="error" class="error-msg"></div>
      <div id="success" class="success-msg"></div>

      <form id="reset-form" class="hidden">
        <div class="form-group">
          <label for="new-password">新密码</label>
          <div class="password-wrap">
            <input id="new-password" type="password" autocomplete="new-password" placeholder="至少 6 位">
            <button class="toggle-pw" type="button" data-target="new-password" aria-label="显示或隐藏密码">
              <svg class="eye-show" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
              <svg class="eye-hide" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="display:none"><path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24"/><line x1="1" y1="1" x2="23" y2="23"/></svg>
            </button>
          </div>
        </div>
        <div class="form-group">
          <label for="confirm-password">确认新密码</label>
          <div class="password-wrap">
            <input id="confirm-password" type="password" autocomplete="new-password" placeholder="再次输入新密码">
            <button class="toggle-pw" type="button" data-target="confirm-password" aria-label="显示或隐藏密码">
              <svg class="eye-show" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
              <svg class="eye-hide" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="display:none"><path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24"/><line x1="1" y1="1" x2="23" y2="23"/></svg>
            </button>
          </div>
        </div>
        <button id="submit-btn" type="submit" class="btn btn-primary">确认修改密码</button>
      </form>

      <div class="tips">
        如果页面长时间停在校验中，请点击右上角使用系统浏览器打开；如果仍提示链接失效，请回到插件登录页重新发送一次重置邮件。
      </div>
    </div>
  </div>

  <script src="./supabase.js"></script>
  <script>
    const SUPABASE_URL = 'https://pvdadthhcnublbzkserl.supabase.co'
    const SUPABASE_KEY = 'sb_publishable_7mHxS_XahD5akTBQxIe1EQ_FuondBY4'
    const LOAD_TIMEOUT_MS = 10000

    const statusEl = document.getElementById('status')
    const errorEl = document.getElementById('error')
    const successEl = document.getElementById('success')
    const formEl = document.getElementById('reset-form')
    const submitBtn = document.getElementById('submit-btn')

    let supabaseClient = null

    function showStatus(message) {
      statusEl.textContent = message
      statusEl.classList.add('show')
    }

    function hideStatus() {
      statusEl.textContent = ''
      statusEl.classList.remove('show')
    }

    function showError(message) {
      errorEl.textContent = message
      errorEl.classList.add('show')
    }

    function hideError() {
      errorEl.textContent = ''
      errorEl.classList.remove('show')
    }

    function showSuccess(message) {
      successEl.textContent = message
      successEl.classList.add('show')
    }

    function withTimeout(promise, message, timeoutMs = LOAD_TIMEOUT_MS) {
      let timeoutId = null
      const timeoutPromise = new Promise((_, reject) => {
        timeoutId = window.setTimeout(() => reject(new Error(message)), timeoutMs)
      })

      return Promise.race([promise, timeoutPromise]).finally(() => {
        if (timeoutId) window.clearTimeout(timeoutId)
      })
    }

    function setupPasswordToggles() {
      document.querySelectorAll('.toggle-pw').forEach((btn) => {
        btn.addEventListener('click', () => {
          const input = document.getElementById(btn.dataset.target)
          const eyeShow = btn.querySelector('.eye-show')
          const eyeHide = btn.querySelector('.eye-hide')
          if (!input || !eyeShow || !eyeHide) return

          if (input.type === 'password') {
            input.type = 'text'
            eyeShow.style.display = 'none'
            eyeHide.style.display = ''
          } else {
            input.type = 'password'
            eyeShow.style.display = ''
            eyeHide.style.display = 'none'
          }
        })
      })
    }

    function getClient() {
      if (supabaseClient) return supabaseClient
      if (!window.supabase || typeof window.supabase.createClient !== 'function') {
        throw new Error('页面资源加载失败，请使用系统浏览器重新打开')
      }

      supabaseClient = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY, {
        auth: {
          persistSession: false,
          autoRefreshToken: false,
          detectSessionInUrl: false
        }
      })
      return supabaseClient
    }

    async function recoverSessionFromUrl() {
      const supabase = getClient()
      const url = new URL(window.location.href)
      const code = url.searchParams.get('code')
      const hashParams = new URLSearchParams(url.hash.startsWith('#') ? url.hash.slice(1) : url.hash)
      const hashType = hashParams.get('type')
      const accessToken = hashParams.get('access_token')
      const refreshToken = hashParams.get('refresh_token')
      const hashErrorDescription = hashParams.get('error_description')

      if (hashErrorDescription) {
        throw new Error(decodeURIComponent(hashErrorDescription.replace(/\+/g, ' ')))
      }

      if (code) {
        const exchangeResult = await withTimeout(
          supabase.auth.exchangeCodeForSession(code),
          '校验链接超时，请使用系统浏览器重新打开'
        )
        if (exchangeResult.error) throw exchangeResult.error
      } else if (accessToken && refreshToken) {
        const sessionResult = await withTimeout(
          supabase.auth.setSession({
            access_token: accessToken,
            refresh_token: refreshToken
          }),
          '校验链接超时，请使用系统浏览器重新打开'
        )
        if (sessionResult.error) throw sessionResult.error
      } else {
        throw new Error('重置链接无效或参数丢失，请使用系统浏览器重新打开，或重新发送重置邮件')
      }

      const { data, error } = await withTimeout(
        supabase.auth.getSession(),
        '会话校验超时，请稍后重试'
      )
      if (error) throw error
      if (!data.session || !data.session.user) {
        throw new Error('重置链接无效或已过期，请重新发送重置邮件')
      }
      if (hashType && hashType !== 'recovery') {
        throw new Error('当前链接不是密码重置链接，请重新发送重置邮件')
      }

      window.history.replaceState({}, document.title, window.location.pathname)
    }

    async function init() {
      hideError()
      showStatus('正在校验重置链接...')
      formEl.classList.add('hidden')
      setupPasswordToggles()

      try {
        await recoverSessionFromUrl()
        hideStatus()
        formEl.classList.remove('hidden')
      } catch (error) {
        hideStatus()
        showError(error && error.message ? error.message : '重置链接校验失败，请重新发送重置邮件')
      }
    }

    formEl.addEventListener('submit', async (event) => {
      event.preventDefault()
      hideError()
      successEl.classList.remove('show')

      const newPassword = document.getElementById('new-password').value
      const confirmPassword = document.getElementById('confirm-password').value

      if (!newPassword) {
        showError('请输入新密码')
        return
      }
      if (newPassword.length < 6) {
        showError('新密码至少 6 位')
        return
      }
      if (newPassword !== confirmPassword) {
        showError('两次输入的新密码不一致')
        return
      }

      submitBtn.disabled = true
      submitBtn.textContent = '正在提交...'

      try {
        const supabase = getClient()
        const updateResult = await withTimeout(
          supabase.auth.updateUser({ password: newPassword }),
          '修改密码超时，请稍后重试'
        )
        if (updateResult.error) throw updateResult.error

        await supabase.auth.signOut()
        formEl.classList.add('hidden')
        showSuccess('密码已重置成功，请回到插件登录页使用新密码登录')
      } catch (error) {
        showError(error && error.message ? error.message : '密码重置失败，请稍后重试')
      } finally {
        submitBtn.disabled = false
        submitBtn.textContent = '确认修改密码'
      }
    })

    init()
  </script>
</body>
</html>
